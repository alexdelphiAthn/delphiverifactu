;
; Configuracion del ejemplo de control del reloj fiscal NO VERI*FACTU.
; Copia este fichero junto al .exe, o pasa su ruta como primer parametro.

[Reloj]
; Margen maximo admitido, en segundos. La ley fija UN MINUTO; aunque pongas
; mas, la libreria lo limita a 60.
MargenSegundos          = 60

; Desfase SIMULADO del reloj del sistema respecto a la hora oficial, en
; segundos (admite decimales y signo). Sirve para probar sin tocar el reloj:
;   0   -> el reloj coincide  -> PERMITIDO
;   90  -> casi minuto y medio -> DENEGADO
;   -75 -> atrasado            -> DENEGADO
DesfaseSimuladoSegundos = 0

; 1 = obtener la hora oficial de un servidor real (cabecera HTTP 'Date').
; 0 = trabajar sin conexion usando la hora del sistema como referencia.
ComprobarRed            = 0
ServidorHora            = https://www.agenciatributaria.gob.es/
TimeoutMs               = 2000
